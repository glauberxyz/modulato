name: Release

# Automated releases via Changesets + npm Trusted Publishing (OIDC).
#
# Flow:
#   1. A push to main carrying .changeset/*.md files makes this workflow open
#      (or refresh) a "Version Packages" PR — it bumps versions + writes
#      changelogs, cascading through internal deps (bump `modulato` and its
#      dependents follow).
#   2. Merging that PR runs the publish step: `changeset publish` ships every
#      package whose version isn't yet on npm, tags them, and creates a GitHub
#      Release per package.
#
# No NPM_TOKEN — OIDC trusted publishing. All 8 packages' trusted-publisher
# configs on npm point at THIS filename (publish.yml). Do not rename this file.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: release-${{ github.ref }}

permissions:
  contents: write # push the version PR branch, tags, GitHub Releases
  pull-requests: write # open/update the Version Packages PR
  id-token: write # OIDC trusted publishing + provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Ensure npm >= 11.5.1 for OIDC trusted publishing. npm@latest (12.x)
      # needs Node >= 22.22.2, so the runner must be 22+/24+ (not 20).
      - run: npm install -g npm@latest

      - run: npm ci

      - uses: changesets/action@v1
        with:
          version: npm run changeset:version # bump versions + changelogs + lockfile
          publish: npm run changeset:publish # npm publish (OIDC) + git tags + GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
